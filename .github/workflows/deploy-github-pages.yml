name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GCQ_FIREBASE_API_KEY: ${{ secrets.GCQ_FIREBASE_API_KEY }}
      GCQ_FIREBASE_AUTH_DOMAIN: ${{ secrets.GCQ_FIREBASE_AUTH_DOMAIN }}
      GCQ_FIREBASE_PROJECT_ID: ${{ secrets.GCQ_FIREBASE_PROJECT_ID }}
      GCQ_FIREBASE_STORAGE_BUCKET: ${{ secrets.GCQ_FIREBASE_STORAGE_BUCKET }}
      GCQ_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.GCQ_FIREBASE_MESSAGING_SENDER_ID }}
      GCQ_FIREBASE_APP_ID: ${{ secrets.GCQ_FIREBASE_APP_ID }}
      GCQ_FIREBASE_MEASUREMENT_ID: ${{ secrets.GCQ_FIREBASE_MEASUREMENT_ID }}
      GCQ_BILLING_BASE_URL: ${{ secrets.GCQ_BILLING_BASE_URL }}
      GCQ_BILLING_SCHOOL_ID: ${{ secrets.GCQ_BILLING_SCHOOL_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build:static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
